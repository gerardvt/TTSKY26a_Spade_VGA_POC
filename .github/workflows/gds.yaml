name: gds

on:
  push:
  workflow_dispatch:

jobs:
  gds:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache swim binary
        id: cache-swim
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/swim
          key: swim-${{ runner.os }}-${{ hashFiles('spade/swim.toml') }}

      - name: Install Swim (Spade build tool)
        if: steps.cache-swim.outputs.cache-hit != 'true'
        run: cargo install --git https://gitlab.com/spade-lang/swim

      - name: Generate Verilog from Spade
        run: |
          cd spade
          swim build
          cp build/spade.sv ../src/design.v

      - name: Build GDS
        uses: TinyTapeout/tt-gds-action@ttsky26a
        with:
          pdk: sky130A

  precheck:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - name: Run Tiny Tapeout Precheck
        uses: TinyTapeout/tt-gds-action/precheck@ttsky26a

  gl_test:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: GL test
        uses: TinyTapeout/tt-gds-action/gl_test@ttsky26a

  viewer:
    needs: gds
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: TinyTapeout/tt-gds-action/viewer@ttsky26a
