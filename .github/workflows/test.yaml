name: test
on: [push, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache swim binary
        id: cache-swim
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/swim
          key: swim-${{ runner.os }}-${{ hashFiles('spade/swim.toml') }}

      - name: Install Swim (Spade build tool)
        if: steps.cache-swim.outputs.cache-hit != 'true'
        run: cargo install --git https://gitlab.com/spade-lang/swim

      - name: Generate Verilog from Spade
        run: |
          cd spade
          swim build
          cp build/spade.sv ../src/design.v

      - name: Install iverilog
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python packages
        shell: bash
        run: pip install -r test/requirements.txt

      - name: Run tests
        run: |
          cd test
          make clean
          make
          ! grep failure results.xml

      - name: Test Summary
        uses: test-summary/action@v2.4
        with:
          paths: "test/results.xml"
        if: always()

      - name: Upload waveform and test results
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test/tb.fst
            test/results.xml
            test/output/*
